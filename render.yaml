services:
  - type: web
    name: aip-cv-enhancer-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --timeout 120
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false

  - type: web
    name: aip-cv-enhancer-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
